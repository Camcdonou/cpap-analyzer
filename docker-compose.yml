services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - cpap-data:/data
      # Mount your SD card data here for loading:
      # - /path/to/your/CPAP-Data-backup:/data/sd_card:ro
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:////data/cpap.db
      - UPLOAD_DIR=/data/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - API_INTERNAL_URL=http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cpap-data:
